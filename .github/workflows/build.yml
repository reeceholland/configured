name: Build Qt App

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  windows-build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.10.1"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"
          cache: true

      - name: Install vcpkg dependencies
        shell: pwsh
        run: '& "$env:VCPKG_INSTALLATION_ROOT\vcpkg.exe" install --triplet x64-windows'

      - name: Configure
        shell: pwsh
        run: >
          cmake -S . -B out/build/x64-debug -G Ninja
          -DCMAKE_BUILD_TYPE=Debug
          -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build out/build/x64-debug

      - name: Test
        run: ctest --test-dir out/build/x64-debug --output-on-failure

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: Configured-windows-debug
          path: out/build/x64-debug/Configured.exe

  linux-build:
    runs-on: ubuntu-latest

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            git \
            ninja-build \
            qt6-base-dev

      - name: Configure
        run: cmake --preset linux-debug

      - name: Build
        run: cmake --build out/build/linux-debug

      - name: Test
        run: ctest --test-dir out/build/linux-debug --output-on-failure

      - name: Upload executable
        uses: actions/upload-artifact@v4
        with:
          name: Configured-linux-debug
          path: out/build/linux-debug/Configured
